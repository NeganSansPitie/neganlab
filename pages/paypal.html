<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Soutenir NeganLab</title>

<script src="https://www.paypal.com/sdk/js?client-id=AR_O9ls48jsRxBPKM9OVlE1o8i6QcVD2hutVxTUjh3TAzOlPxxuHHaOnt8JwvqUftd8L-tKV86pgME2Z&currency=EUR"></script>

<style>

/* RESET */
* { margin:0; padding:0; box-sizing:border-box; font-family:Arial; }

body {
    background:black;
    display:flex;
    justify-content:center;
}

/* APP */
.app {
    width:100%;
    max-width:420px;
    min-height:100vh;
    background: radial-gradient(circle at top, #1a1a2e, #050510);
    color:white;
    padding:20px;
}

/* 🎬 INTRO */
#intro {
    position:fixed;
    inset:0;
    background:black;
    display:flex;
    justify-content:center;
    align-items:center;
    z-index:9999;
}

#intro h1 {
    font-size:28px;
    text-align:center;
    color:#c77dff;
    opacity:0;
    animation: introAnim 2.8s ease forwards;
}

/* ANIMATION PLUS LENTE */
@keyframes introAnim {
    0% {
        transform:scale(0.6);
        opacity:0;
    }
    50% {
        opacity:1;
    }
    100% {
        transform:scale(1);
        opacity:1;
    }
}

/* TITRE */
h2 {
    text-align:center;
    margin-bottom:20px;
    background:linear-gradient(90deg,#c77dff,#00f5ff,#ff4dff);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

/* INPUT */
input {
    width:100%;
    margin:10px 0;
    padding:12px;
    border-radius:12px;
    border:none;
    outline:none;
    background:#0a0a1a;
    color:white;
    box-shadow:0 0 10px rgba(199,125,255,0.3);
}

input:focus {
    box-shadow:0 0 15px #c77dff;
}

/* PAYPAL */
#paypal-button-container {
    margin-top:15px;
}

/* RETOUR */
.back {
    display:block;
    text-align:center;
    margin-bottom:15px;
    color:#00f5ff;
    text-decoration:none;
}

/* CARD */
.card {
    background:rgba(10,10,26,0.8);
    padding:20px;
    border-radius:20px;
    box-shadow:0 0 25px rgba(199,125,255,0.2);
}

</style>
</head>

<body>

<!-- INTRO -->
<div id="intro">
    <h1>💜 Merci pour ton soutien ❤️</h1>
</div>

<div class="app">

<a href="../index.html" class="back">⬅ Retour</a>

<div class="card">

<h2>Soutenir NeganLab</h2>

<input id="amount" type="number" value="1.00" step="0.50" placeholder="Montant €">
<input id="name" type="text" placeholder="Ton pseudo">
<input id="message" type="text" placeholder="Message">

<div id="paypal-button-container"></div>

</div>

</div>

<script>

// ⏱️ INTRO PLUS LONGUE + DISPARITION DOUCE
setTimeout(() => {
    document.getElementById("intro").style.opacity = "0";
    document.getElementById("intro").style.transition = "0.6s";

    setTimeout(() => {
        document.getElementById("intro").style.display = "none";
    }, 600);

}, 3200);

// PAYPAL
paypal.Buttons({

  createOrder: function(data, actions) {
    let amount = document.getElementById("amount").value;

    return actions.order.create({
      purchase_units: [{
        amount: { value: amount }
      }]
    });
  },

  onApprove: function(data, actions) {
    return actions.order.capture().then(function(details) {

      let name = document.getElementById("name").value || "Anonyme";
      alert("🔥 Merci " + name + " pour ton don !");

    });
  }

}).render('#paypal-button-container');

</script>

</body>
</html>
